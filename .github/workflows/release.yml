name: Release

on:
  push:
    # Player releases only (editor builds locally; server publishes from docker-image.yml).
    tags: ["player-[0-9]*.[0-9]*.[0-9]*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 0.2.0; the player- prefix is added)"
        type: string
        required: true
      dry_run:
        description: "Dry run (build + sign + notarize, skip GitHub Release)"
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build, Sign, Notarize & Publish
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Don't persist the GITHUB_TOKEN in .git/config — appcast commit step
          # configures its own credentials when it actually needs to push.
          persist-credentials: false

      - name: Verify ref is reachable from main
        run: |
          # Only sign+notarize commits already merged to main. Applies to both tag
          # pushes and `workflow_dispatch` so a manual run cannot route signing
          # secrets through code on an arbitrary side branch.
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Commit ${GITHUB_SHA} is not an ancestor of origin/main." >&2
            exit 1
          fi

      - name: Resolve version
        env:
          # Route the dispatch input through env rather than splicing ${{ }} into the
          # shell, so a hostile value can't inject commands into this run.
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # RELEASE_TAG is the full git tag (player-X.Y.Z) — it names the GitHub Release
          # and the Sparkle download URL prefix. MARKETING_VERSION is the bare X.Y.Z used
          # for bundle versions and asset filenames.
          if [[ "${{ github.event_name }}" == "push" ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${RELEASE_TAG#player-}"
          else
            # Strip a player- prefix the operator may type by habit, so it isn't doubled
            # into RELEASE_TAG / asset filenames (symmetric with the push path's strip).
            VERSION="${INPUT_VERSION#player-}"
            RELEASE_TAG="player-${VERSION}"
          fi
          # Reject characters unsafe for the GitHub Release tag, the Sparkle download URL,
          # asset filenames, and the $GITHUB_ENV writes below (newlines would inject extra
          # entries). The push glob is fnmatch, not a regex, so a malformed tag can reach here.
          if [[ ! "${VERSION}" =~ ^[0-9A-Za-z.+-]+$ ]]; then
            echo "ERROR: version '${VERSION}' contains unsafe characters" >&2
            exit 1
          fi
          echo "MARKETING_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Check out asset pack
        uses: actions/checkout@v6
        with:
          # Tilesets / sprites / animation strips are licensed art that can be bundled
          # into the shipped binary but not redistributed as source, so they live in a
          # separate private repo. The default GITHUB_TOKEN only reaches this repo;
          # ASSETS_DEPLOY_KEY is a read-only SSH deploy key scoped to somnio-assets.
          # Pin to a tag/SHA here instead of the default branch if you want releases to
          # reference an immutable asset revision.
          repository: tobihagemann/somnio-assets
          ssh-key: ${{ secrets.ASSETS_DEPLOY_KEY }}
          path: assets
          persist-credentials: false

      - name: Import code signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          echo "$P12_BASE64" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          rm -f /tmp/certificate.p12
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Install packaging tools
        # create-dmg builds the install DMG; argon2 provides libargon2 for the CArgon2
        # link in the release swift build.
        run: brew install create-dmg argon2

      - name: Build, sign, and notarize
        env:
          APP_IDENTITY: ${{ secrets.APP_IDENTITY }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          SPARKLE_FEED_URL_PLAYER: ${{ secrets.SPARKLE_FEED_URL_PLAYER }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          ARCHES: "arm64 x86_64"
          # Asset pack root (five subtrees at the repo root) consumed by
          # Scripts/bundle-assets.sh, and the production gameplay endpoint baked into
          # the player by Scripts/inject-release-transport.sh. The URL is not sensitive
          # (every player sees it), so it lives in a repo *variable*, not a secret; the
          # pinned trust root is the committed Scripts/release-trust-roots.pem.
          SOMNIO_ASSET_SOURCE: ${{ github.workspace }}/assets
          SOMNIO_GAMEPLAY_PRODUCTION_URL: ${{ vars.SOMNIO_GAMEPLAY_PRODUCTION_URL }}
        run: ./Scripts/release.sh player

      - name: Compute checksums
        run: |
          source version.env
          shasum -a 256 \
            "${APP_NAME}-${MARKETING_VERSION}.zip" \
            "${APP_NAME}-${MARKETING_VERSION}.dmg" > checksums.txt
          cat checksums.txt

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          source version.env
          SPARKLE_BIN=".build/artifacts/sparkle/Sparkle/bin"

          KEY_FILE=$(mktemp)
          echo "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          release_dir=$(mktemp -d)
          cp "${APP_NAME}-${MARKETING_VERSION}.zip" "$release_dir/"
          # The download URL prefix must point at this release's assets, which live under
          # the full tag (player-X.Y.Z), not the bare version. `-o` pins the output name
          # (otherwise Sparkle derives it from SUFeedURL.lastPathComponent).
          "$SPARKLE_BIN/generate_appcast" \
            --ed-key-file "$KEY_FILE" \
            --download-url-prefix "https://github.com/tobihagemann/somnio/releases/download/${RELEASE_TAG}/" \
            -o appcast.xml \
            "$release_dir"
          rm -rf "$release_dir"

          rm -f "$KEY_FILE"

      - name: Extract release notes from CHANGELOG.md
        run: |
          # Extract the section for this version (between ## headings) for both
          # tag pushes and `workflow_dispatch` runs that publish; the file is
          # consumed by the next step's `gh release create --notes-file`.
          # Must run before checking out main so we read the tagged commit's file.
          if [[ -f CHANGELOG.md ]]; then
            # Match the version's section heading, whether bare (## 0.1.0 ...) or the
            # bracketed Keep a Changelog form (## [0.1.0] ...). Stop at the next ## heading
            # or at the trailing link-reference block ([0.1.0]: ...) so neither leaks in.
            awk -v ver="$MARKETING_VERSION" '
              /^## / { if (found) exit; if ($2 == ver || $2 == "[" ver "]") found=1; next }
              found && /^\[[^]]+\]:/ { exit }
              found { print }
            ' CHANGELOG.md > release_notes.txt
          fi
          if [[ ! -s release_notes.txt ]]; then
            printf '%s release\n' "$MARKETING_VERSION" > release_notes.txt
          fi
          cat release_notes.txt

      - name: Create GitHub Release
        if: |
          !inputs.dry_run && (
            startsWith(github.ref, 'refs/tags/') ||
            github.event_name == 'workflow_dispatch'
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source version.env
          # --target pins a dispatch-created tag to the built commit; on a tag push the tag
          # already exists and --target is ignored.
          gh release create "${RELEASE_TAG}" \
            "${APP_NAME}-${MARKETING_VERSION}.zip" \
            "${APP_NAME}-${MARKETING_VERSION}.dmg" \
            checksums.txt \
            appcast.xml \
            --target "${GITHUB_SHA}" \
            --title "${APP_NAME} ${MARKETING_VERSION}" \
            --notes-file release_notes.txt

      - name: Commit appcast to main
        if: |
          !inputs.dry_run && (
            startsWith(github.ref, 'refs/tags/') ||
            github.event_name == 'workflow_dispatch'
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure credentials for this push only; checkout was set to
          # persist-credentials: false so the token isn't shared with the
          # earlier signing/notarize steps.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # Save generated appcast — git checkout would overwrite it if main
          # already tracks the file from a previous release.
          cp appcast.xml /tmp/appcast.xml
          git checkout main
          cp /tmp/appcast.xml appcast.xml
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "Appcast unchanged, skipping commit."
          else
            git commit -m "Update appcast for ${MARKETING_VERSION}"
            git push origin main
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            *.zip
            *.dmg
            checksums.txt
            appcast.xml

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain-db || true
