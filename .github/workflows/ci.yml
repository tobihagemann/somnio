name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        # The runner image preinstalls some of these and `brew install` won't upgrade an
        # outdated preinstall; .swiftformat's rule set needs the pinned minversion.
        run: |
          brew update
          brew install swiftlint swiftformat periphery
          brew upgrade swiftlint swiftformat periphery || true

      - name: Install build prerequisites
        run: brew install argon2

      - name: Lint & Format Check
        run: ./Scripts/lint.sh

  build-and-test:
    name: Build & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install build prerequisites
        run: brew install argon2

      - name: Build
        run: swift build

      - name: Test
        run: swift test --no-parallel
        timeout-minutes: 5

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - name: Install libargon2-dev
        run: sudo apt-get update && sudo apt-get install -y libargon2-dev
      - name: Verify Docker is reachable
        # Fails the job loudly rather than letting every suite skip silently via the
        # `.requiresContainerRuntime` trait. If this passes, ContainerRuntime.detected
        # will return .docker on the runner.
        run: docker info -f '{{.ServerVersion}}'
      - name: Run integration tests
        run: swift test --package-path IntegrationTests --no-parallel
        timeout-minutes: 25

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Populate sectors
        # The server fails startup with ServerStartupError.noSectorsLoaded if its
        # SOMNIO_SECTORS_DIR is empty. The compose `server` service mounts
        # ./sectors:/opt/somnio/sectors:ro, so seed it from the bundled fixtures.
        run: |
          mkdir -p sectors
          cp Tests/SomnioMapFixturesTestSupport/MapFixtures/*.somnio-sector sectors/
      - name: Build image
        # The Dockerfile requires MARKETING_VERSION (no default) and fails the build
        # without it. `docker compose build --build-arg` forwards the value to the
        # `server` service because its Dockerfile declares `ARG MARKETING_VERSION`.
        run: docker compose -f docker-compose.example.yml build --build-arg MARKETING_VERSION=ci-test
      - name: Bring stack up and wait for healthy
        # Gates on the server healthcheck (curl /health -> SELECT 1), not just the db, so a
        # boot regression fails the job. Runs the shipped example file as-is — its
        # placeholder secrets are internally consistent.
        run: docker compose -f docker-compose.example.yml up --wait --wait-timeout 120
      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.example.yml ps
          docker compose -f docker-compose.example.yml logs --no-color
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.example.yml down -v

  release-smoke:
    name: Release Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Run release script smoke test
        # Pure bash: PATH-shims the macOS-only signing/notarize tools and injects stub
        # sibling-scripts, then runs the real Scripts/release.sh and asserts its control
        # flow. No swift/brew/Docker setup needed; the stubs supply the absent tools.
        run: ./Scripts/tests/release_smoke_test.sh
